tags:
  - session
summary: 获取会话信息
description: 获取指定id的会话信息
parameters:
  - in: path
    name: session_id
    required: true
    schema:
      type: integer
      format: int64
    description: 会话的唯一标识ID
    example: 12345
responses:
  200:
    description: 成功获取会话信息
    content:
      application/json:
        schema:
           $ref: '#/components/schemas/Session'
  401:
    description: 未授权访问
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/ErrorResponse'
  404:
    description: 不存在
    examples:
      application/json:
        success: false
        error: "不存在或已被删除"
security:
  - Bearer: []